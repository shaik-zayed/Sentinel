# =============================================================================
# Sentinel – Full Stack docker-compose
# =============================================================================

services:

  # ─────────────────────────────────────────────────────────────────────────
  # INFRASTRUCTURE
  # ─────────────────────────────────────────────────────────────────────────
  mysql:
    build:
      context: ./mysql-init
      dockerfile: Dockerfile.mysql
    container_name: sentinel-v2-mysql
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:-root}"
      MYSQL_USER: sentinel
      MYSQL_PASSWORD: "${DB_PASSWORD:-sentinel}"
    volumes:
      - mysql-data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - sentinel-net
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost","-u", "sentinel", "--password=${DB_PASSWORD:-sentinel}" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 120s
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: sentinel-v2-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:29093"
      KAFKA_LISTENERS: "INTERNAL://kafka:29092,CONTROLLER://kafka:29093,EXTERNAL://0.0.0.0:9092"
      # EXTERNAL points to the Docker host so host-local tooling can reach it
      KAFKA_ADVERTISED_LISTENERS: "INTERNAL://kafka:29092,EXTERNAL://localhost:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "INTERNAL"
      CLUSTER_ID: "${KAFKA_CLUSTER_ID:-MkQrZGJiNTcwYTI4NDQ2ZTk5}"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - sentinel-net
    healthcheck:
      test: [ "CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list" ]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 180s
    restart: unless-stopped

  #  kafka-ui:
  #    image: provectuslabs/kafka-ui:latest
  #    container_name: sentinel-v2-kafka-ui
  #    depends_on:
  #      kafka:
  #        condition: service_healthy
  #    ports:
  #      - "8079:8080"    # Moved off 8080 – api-gateway uses 7777, but avoid surprise conflicts
  #    environment:
  #      KAFKA_CLUSTERS_0_NAME: local
  #      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
  #    networks:
  #      - sentinel-net
  #    restart: unless-stopped

  smtp4dev:
    image: rnwood/smtp4dev:latest
    container_name: sentinel-v2-smtp4dev
    restart: unless-stopped
    ports:
      - "5000:80"   # Web UI  → http://localhost:5000
      #      - "2525:25"   # SMTP
      - "25:25"   # SMTP
      - "143:143"   # IMAP
    environment:
      # No external IP needed inside Docker – services reach it via hostname
      SMTP4DEV__BASE_URL: "http://smtp4dev:80"
    volumes:
      - smtp4dev-data:/smtp4dev
    networks:
      - sentinel-net

  minio:
    image: minio/minio:latest
    container_name: sentinel-v2-minio
    ports:
      - "9000:9000"   # S3-compatible API
      - "9001:9001"   # Web console → http://localhost:9001
    environment:
      MINIO_ROOT_USER: "${MINIO_ACCESS_KEY:-sentinel}"
      MINIO_ROOT_PASSWORD: "${MINIO_SECRET_KEY:-sentinel123}"
#      MINIO_SERVER_URL: "${MINIO_PUBLIC_ENDPOINT:-http://localhost:9000}"
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    networks:
      - sentinel-net
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────────────
  # SPRING BOOT SERVICES  (startup order: eureka → gateway → everything else)
  # ─────────────────────────────────────────────────────────────────────────

  eureka-server:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: eureka-server
    container_name: sentinel-v2-eureka
    ports:
      - "8761:8761"
    environment:
      EUREKA_SERVER_URL: "http://eureka-server:8761/eureka"
#      JWT_SECRET_KEY: ""
    networks:
      - sentinel-net
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "--fail", "--silent", "http://127.0.0.1:8761/actuator/health" ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 180s

  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: api-gateway
    container_name: sentinel-v2-gateway
    ports:
      - "7777:7777"
    depends_on:
      eureka-server:
        condition: service_healthy
    #      kafka:
    #        condition: service_healthy
    environment:
      SERVER_PORT: "7777"
      EUREKA_SERVER_URL: "http://eureka-server:8761/eureka"
      JWT_SECRET_KEY: "${JWT_SECRET_KEY}"
    #      SPRING_KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"
    networks:
      - sentinel-net
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "--fail", "--silent", "http://127.0.0.1:7777/actuator/health" ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 90s

  auth-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: auth-service
    container_name: sentinel-v2-auth
    ports:
      - "8083:8083"
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      EUREKA_SERVER_URL: "http://eureka-server:8761/eureka"
      JWT_SECRET_KEY: "${JWT_SECRET_KEY}"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/mydb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
      # FIX: Use variable for DB password (consistency with scan-service)
      SPRING_DATASOURCE_USERNAME: "sentinel"
      SPRING_DATASOURCE_PASSWORD: "${DB_PASSWORD:-sentinel}"
      DB_USERNAME: "sentinel"
      DB_PASSWORD: "${DB_PASSWORD:-sentinel}"
      SMTP_HOST: "smtp4dev"
      SMTP_PORT: "25"
      # CORS – allow the gateway to call through
      ALLOWED_ORIGINS: "http://localhost:3000,http://localhost:4200,http://localhost:7777"
    networks:
      - sentinel-net
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "--fail", "--silent", "http://127.0.0.1:8083/actuator/health" ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 90s

  scan-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: scan_service
    container_name: sentinel-v2-scan
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SERVER_PORT: "8081"
      EUREKA_SERVER_URL: "http://eureka-server:8761/eureka"
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/scan_results?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
      SPRING_DATASOURCE_USERNAME: "sentinel"
      SPRING_DATASOURCE_PASSWORD: "${DB_PASSWORD:-sentinel}"
      DB_USERNAME: "sentinel"
      DB_PASSWORD: "${DB_PASSWORD:-sentinel}"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"
    networks:
      - sentinel-net
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "--fail", "--silent", "http://127.0.0.1:8081/actuator/health" ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 90s

  nmap-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: nmap_service
    container_name: sentinel-v2-nmap
    ports:
      - "8082:8082"
    depends_on:
      eureka-server:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SERVER_PORT: "8082"
      EUREKA_SERVER_URL: "http://eureka-server:8761/eureka"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"
      # Override docker.host so nmap-service uses the mounted socket
      # instead of the hardcoded tcp://localhost:2375
      DOCKER_HOST: "unix:///var/run/docker.sock"
    volumes:
      # Mount the Docker socket so nmap-service can launch nmap containers
      # on the host Docker daemon (required for host-network nmap scans)
      - /var/run/docker.sock:/var/run/docker.sock
    # nmap containers need CAP_NET_RAW for SYN scans – give it to the
    # nmap-service container as well so the Docker API calls succeed
    cap_add:
      - NET_ADMIN
      - NET_RAW
    user: root
    networks:
      - sentinel-net
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "--fail", "--silent", "http://127.0.0.1:8082/actuator/health" ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 90s

  report-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: report-service
    container_name: sentinel-v2-report
    ports:
      - "8085:8085"
    depends_on:
      eureka-server:
        condition: service_healthy
      minio:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SERVER_PORT: "8085"
      EUREKA_SERVER_URL: "http://eureka-server:8761/eureka"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"
      MINIO_ENDPOINT: "http://minio:9000"
#      MINIO_ENDPOINT: "http://host.docker.internal:9000"
      MINIO_ACCESS_KEY: "${MINIO_ACCESS_KEY:-sentinel}"
      MINIO_SECRET_KEY: "${MINIO_SECRET_KEY:-sentinel123}"
      MINIO_BUCKET: "${MINIO_BUCKET:-sentinel-reports}"
    networks:
      - sentinel-net
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "--fail", "--silent", "http://127.0.0.1:8085/actuator/health" ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 90s

# ===========================================================================
# VOLUMES
# ===========================================================================
volumes:
  mysql-data:
  minio-data:
  smtp4dev-data:
  kafka-data:

# ===========================================================================
# NETWORKS
# ===========================================================================
networks:
  sentinel-net:
    driver: bridge