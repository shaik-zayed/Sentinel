name: sentinel-dev

services:
  mysql:
    build:
      context: ./mysql-init
      dockerfile: Dockerfile.mysql
    container_name: sentinel-dev-mysql
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:-root}"
      MYSQL_USER: sentinel
      MYSQL_PASSWORD: "${DB_PASSWORD:-sentinel}"
    volumes:
      - mysql-dev-data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - sentinel-dev-net
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost","-u", "sentinel", "--password=${DB_PASSWORD:-sentinel}" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 120s
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: sentinel-dev-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:29093"
      KAFKA_LISTENERS: "INTERNAL://kafka:29092,CONTROLLER://kafka:29093,EXTERNAL://0.0.0.0:9092"
      # EXTERNAL points to the Docker host so host-local tooling can reach it
      KAFKA_ADVERTISED_LISTENERS: "INTERNAL://kafka:29092,EXTERNAL://localhost:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "INTERNAL"
      CLUSTER_ID: "${KAFKA_CLUSTER_ID:-MkQrZGJiNTcwYTI4NDQ2ZTk5}"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - kafka-dev-data:/var/lib/kafka/data
    networks:
      - sentinel-dev-net
    healthcheck:
      test: [ "CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list" ]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 180s
    restart: unless-stopped

  #  kafka-ui:
  #    image: provectuslabs/kafka-ui:latest
  #    container_name: sentinel-dev-kafka-ui
  #    depends_on:
  #      kafka:
  #        condition: service_healthy
  #    ports:
  #      - "8079:8080"    # Moved off 8080 – api-gateway uses 7777, but avoid surprise conflicts
  #    environment:
  #      KAFKA_CLUSTERS_0_NAME: local
  #      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
  #    networks:
  #      - sentinel-dev-net
  #    restart: unless-stopped

  smtp4dev:
    image: rnwood/smtp4dev:latest
    container_name: sentinel-dev-smtp4dev
    restart: unless-stopped
    ports:
      - "5000:80"   # Web UI  → http://localhost:5000
      - "25:25"   # SMTP
      - "143:143"   # IMAP
    environment:
      SMTP4DEV__BASE_URL: "http://localhost:80"
    volumes:
      - smtp4dev-dev-data:/smtp4dev
    networks:
      - sentinel-dev-net

  minio:
    image: minio/minio:latest
    container_name: sentinel-dev-minio
    ports:
      - "9000:9000"   # S3-compatible API
      - "9001:9001"   # Web console → http://localhost:9001
    environment:
      MINIO_ROOT_USER: "${MINIO_ACCESS_KEY:-sentinel}"
      MINIO_ROOT_PASSWORD: "${MINIO_SECRET_KEY:-sentinel123}"
    #      MINIO_SERVER_URL: "${MINIO_PUBLIC_ENDPOINT:-http://localhost:9000}"
    command: server /data --console-address ":9001"
    volumes:
      - minio-dev-data:/data
    networks:
      - sentinel-dev-net
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  mysql-dev-data:
  minio-dev-data:
  smtp4dev-dev-data:
  kafka-dev-data:

networks:
  sentinel-dev-net:
    driver: bridge