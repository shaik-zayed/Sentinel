# Overrides config for test execution.
server:
  port: 0

spring:
  application:
    name: auth-service-test
  main:
    banner-mode: off
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: false
  mail:
    host: localhost
    port: 1025
    username:
    password:
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

application:
  cors:
    allowed-origins: http://localhost:3000
  security:
    jwt:
      secret-key: dGVzdC1zZWNyZXQta2V5LXRoYXQtaXMtMzItYnl0ZXMtbG9uZw==
      access-token:
        expiration: 900000
      refresh-token:
        expiration: 604800000
  email:
    from: test@sentinel.local
    verification-url: http://localhost:3000/verify-email
    password-reset-url: http://localhost:3000/reset-password

eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false

management:
  endpoints:
    web:
      exposure:
        include: health

logging:
  level:
    org.springframework.security: WARN
    org.sentinel: DEBUG
    org.hibernate.SQL: WARN