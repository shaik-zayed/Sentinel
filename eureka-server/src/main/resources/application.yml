server:
  port: 8761
  shutdown: graceful

spring:
  application:
    name: eureka-server
  main:
    banner-mode: off
  lifecycle:
    timeout-per-shutdown-phase: 30s
eureka:
  client:
    register-with-eureka: false
    fetch-registry: false
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    readinessstate:
      enabled: true
    livenessstate:
      enabled: true